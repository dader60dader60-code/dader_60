<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>達德速度版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: "Microsoft JhengHei", Arial, sans-serif; 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            padding-bottom: 80px; 
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 400px; }
        .profile-pic { 
            width: 110px; height: 110px; border-radius: 50%; background-color: white; 
            border: 3px solid white; margin: 10px auto 15px auto; display: block; 
            object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; color: #333; text-shadow: 1px 1px 2px white; margin-bottom: 25px; }
        .card, .line-section, .live-section { 
            background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; text-decoration: none; 
            color: #333; display: block; font-weight: bold; box-sizing: border-box; 
        }
        .owner-ig { background: #fff5f5; border: 2px solid #fd5d93; color: #fd5d93; }
        .owner-tiktok { background: #000000; color: #ffffff; border: 2px solid #25F4EE; }
        
        .toolbox-card { 
            background: linear-gradient(135deg, #6e8efb, #a777e3); 
            color: white; 
            border: none; 
            position: relative; 
            overflow: hidden; 
            animation: glowing 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .toolbox-card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(30deg);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }
        @keyframes glowing {
            0% { box-shadow: 0 0 5px #6e8efb; }
            50% { box-shadow: 0 0 20px #a777e3; }
            100% { box-shadow: 0 0 5px #6e8efb; }
        }

        .yt-card { background: #fff1f1; border: 2px solid #ff0000; color: #ff0000; margin-bottom: 10px; }
        .qrcode-img { width: 180px; height: 180px; margin: 10px auto; display: block; border-radius: 10px; }
        .line-id { background: #00b900; color: white; padding: 10px 25px; border-radius: 50px; display: inline-block; cursor: pointer; margin-top: 10px; }
        
        .weather-box { background: #4A90E2; color: white; padding: 20px; border-radius: 24px; }
        .weather-select { width: 45%; padding: 10px; border-radius: 10px; border: none; font-weight: bold; margin: 5px 2px; cursor: pointer; }
        .weather-main-info { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
        .weather-icon-large { width: 60px; height: 60px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2)); }
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; font-size: 13px; text-align: left; }
        .weather-item { background: rgba(255,255,255,0.15); padding: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: flex-start; gap: 5px; }
        .sun-moon-info { grid-column: span 2; background: rgba(255,255,255,0.25); padding: 10px; border-radius: 10px; margin-top: 5px; }
        .sun-countdown { grid-column: span 2; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 10px; text-align: center; font-size: 13px; margin-top: 5px; color: #fff; border: 1px dashed rgba(255,255,255,0.5); }
        
        .forecast-container { grid-column: span 2; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.3); }
        .forecast-title { font-size: 12px; margin-bottom: 8px; text-align: center; opacity: 0.9; }
        .forecast-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; scrollbar-width: none; }
        .forecast-scroll::-webkit-scrollbar { display: none; }
        .forecast-item { min-width: 70px; text-align: center; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 10px; font-size: 11px; flex-shrink: 0; }
        .mini-icon { width: 24px; height: 24px; margin: 4px auto; display: block; }
