<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中彰投即時天氣查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }
        body {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
        }
        .forecast-scroll::-webkit-scrollbar { height: 4px; }
        .forecast-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
        @keyframes sun-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-spin-slow { animation: sun-spin 8s linear infinite; }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800">
    <div class="max-w-2xl mx-auto">
        <div class="weather-card rounded-3xl p-6 shadow-2xl border border-white/20">
            <h1 class="text-2xl font-bold text-center mb-6 tracking-tight">中彰投即時天氣觀測</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-slate-500 mb-1">縣市選擇</label>
                    <select id="citySelect" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="彰化縣" selected>彰化縣</option>
                        <option value="臺中市">臺中市</option>
                        <option value="南投縣">南投縣</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-500 mb-1">鄉鎮市區</label>
                    <select id="districtSelect" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none bg-white"></select>
                </div>
            </div>

            <button id="searchBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg active:scale-95 flex items-center justify-center gap-2">
                <i data-lucide="search" class="w-5 h-5"></i> 立即查詢
            </button>
            <p id="autoUpdateHint" class="text-center text-[10px] text-blue-500/60 mt-2 font-medium">系統已啟動：每小時自動刷新資料</p>

            <div id="loading" class="hidden py-12 text-center">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent"></div>
                <p class="text-slate-500 mt-3 font-medium">同步氣象署最新數據中...</p>
            </div>

            <div id="result" class="hidden space-y-8 mt-6">
                <!-- 主要天氣 -->
                <div class="text-center">
                    <div id="locationName" class="text-2xl font-bold text-slate-800"></div>
                    <div class="flex items-center justify-center gap-6 my-4">
                        <div id="weatherIconContainer" class="w-20 h-20 flex items-center justify-center"></div>
                        <div id="temp" class="text-7xl font-light text-blue-600">--°C</div>
                    </div>
                    <div id="desc" class="text-xl text-slate-600 font-medium">--</div>
                    <div id="umbrellaTip" class="mt-4 inline-flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold"></div>
                </div>

                <!-- 數據網格 -->
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100/50">
                        <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-1">體感溫度</div>
                        <div id="feelsLike" class="text-xl font-bold text-blue-900">--°C</div>
                    </div>
                    <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100/50">
                        <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-1">降雨機率</div>
                        <div id="pop" class="text-xl font-bold text-blue-600">--%</div>
                    </div>
                    <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100/50">
                        <div class="text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-1">紫外線</div>
                        <div id="uvi" class="text-xl font-bold text-orange-600">--</div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-center">
                        <div class="text-[11px] text-slate-400 font-bold uppercase mb-1">風向風速</div>
                        <div id="windInfo" class="text-sm font-bold">--</div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-center">
                        <div class="text-[11px] text-slate-400 font-bold uppercase mb-1">濕度</div>
                        <div id="humidity" class="text-xl font-bold text-cyan-700">--%</div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-col items-center justify-center">
                        <div class="text-[11px] text-slate-400 font-bold uppercase mb-1 w-full text-center">月相</div>
                        <div class="flex items-center gap-2">
                            <div id="moonIcon" class="w-6 h-6 text-indigo-600"></div>
                            <span id="moonPhase" class="text-sm font-bold text-indigo-700">--</span>
                        </div>
                    </div>
                </div>

                <!-- 日月時間 -->
                <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-5 rounded-2xl text-white shadow-lg">
                    <div class="grid grid-cols-2 gap-4 text-xs font-medium opacity-90 mb-4">
                        <div class="flex flex-col gap-1">
                            <span>🌅 日出 <b id="sunrise" class="ml-2 font-bold text-lg">--:--</b></span>
                            <span>🌇 日落 <b id="sunset" class="ml-2 font-bold text-lg">--:--</b></span>
                        </div>
                        <div class="flex flex-col gap-1 text-right">
                            <span>🌙 月出 <b id="moonrise" class="ml-2 font-bold text-lg">--:--</b></span>
                            <span>🌑 月沒 <b id="moonset" class="ml-2 font-bold text-lg">--:--</b></span>
                        </div>
                    </div>
                    <div id="sunCountdown" class="text-center font-bold bg-white/20 backdrop-blur py-3 rounded-xl text-base tracking-widest border border-white/20">
                        計算中...
                    </div>
                </div>

                <!-- 24小時預報 -->
                <div>
                    <h3 class="text-sm font-bold text-slate-500 uppercase mb-3 px-1">未來 24 小時預報 (精確每小時)</h3>
                    <div id="hourlyForecast" class="flex gap-3 overflow-x-auto forecast-scroll pb-4"></div>
                </div>

                <!-- 一週預報 -->
                <div>
                    <h3 class="text-sm font-bold text-slate-500 uppercase mb-3 px-1">一週天氣預報 (完整 7 天)</h3>
                    <div id="weeklyForecast" class="space-y-2"></div>
                </div>

                <div class="pt-6 border-t border-slate-100 text-[10px] text-slate-400 flex justify-between items-center">
                    <span>來源：中央氣象署 (CWA)</span>
                    <span id="lastUpdate" class="font-medium">最後更新：----/--/-- --:--:--</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const districts = {
            "彰化縣": ["彰化市", "鹿港鎮", "和美鎮", "線西鄉", "伸港鄉", "福興鄉", "秀水鄉", "花壇鄉", "芬園鄉", "員林市", "溪湖鎮", "田中鎮", "大村鄉", "埔鹽鄉", "埔心鄉", "永靖鄉", "社頭鄉", "二水鄉", "北斗鎮", "二林鎮", "田尾鄉", "埤頭鄉", "芳苑鄉", "大城鄉", "竹塘鄉", "溪州鄉"],
            "臺中市": ["中區", "東區", "南區", "西區", "北區", "北屯區", "西屯區", "南屯區", "太平區", "大里區", "霧峰區", "烏日區", "豐原區", "後里區", "石岡區", "東勢區", "和平區", "新社區", "潭子區", "大雅區", "神岡區", "大肚區", "沙鹿區", "龍井區", "梧棲區", "清水區", "大甲區", "外埔區", "大安區"],
            "南投縣": ["南投市", "埔里鎮", "草屯鎮", "竹山鎮", "集集鎮", "名間鄉", "鹿谷鄉", "中寮鄉", "魚池鄉", "國姓鄉", "水里鄉", "信義鄉", "仁愛鄉"]
        };

        const citySelect = document.getElementById('citySelect');
        const districtSelect = document.getElementById('districtSelect');
        const searchBtn = document.getElementById('searchBtn');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        
        let countdownInterval;
        let autoUpdateInterval;

        function updateDistricts(defaultDist = null) {
            const city = citySelect.value;
            districtSelect.innerHTML = '';
            districts[city].forEach(dist => {
                const opt = document.createElement('option');
                opt.value = dist;
                opt.textContent = dist;
                if (dist === defaultDist) opt.selected = true;
                districtSelect.appendChild(opt);
            });
        }
        
        window.addEventListener('load', () => {
            updateDistricts("田中鎮");
            lucide.createIcons();
            // 頁面加載後自動執行第一次查詢
            fetchWeather();
            // 設定每小時自動更新 (3600000 毫秒)
            autoUpdateInterval = setInterval(fetchWeather, 3600000);
        });

        citySelect.addEventListener('change', () => updateDistricts());

        function getWeatherIcon(desc, size = 48) {
            const lowDesc = desc.toLowerCase();
            if (lowDesc.includes('雨')) return `<i data-lucide="cloud-rain" class="w-${size/4} h-${size/4} text-blue-500"></i>`;
            if (lowDesc.includes('晴')) return `<i data-lucide="sun" class="w-${size/4} h-${size/4} text-yellow-500 animate-spin-slow"></i>`;
            if (lowDesc.includes('雲') || lowDesc.includes('陰')) return `<i data-lucide="cloud" class="w-${size/4} h-${size/4} text-slate-400 animate-float"></i>`;
            return `<i data-lucide="cloud-sun" class="w-${size/4} h-${size/4} text-orange-400"></i>`;
        }

        function getMoonIcon(phase) {
            const icons = {
                '新月': 'moon-star', '眉月': 'moon', '上弦月': 'moon', 
                '盈凸月': 'moon', '滿月': 'circle', '虧凸月': 'moon', 
                '下弦月': 'moon', '殘月': 'moon'
            };
            return `<i data-lucide="${icons[phase] || 'moon'}" class="w-5 h-5"></i>`;
        }

        async function fetchWeather() {
            const city = citySelect.value;
            const dist = districtSelect.value;
            const apiKey = ""; 

            // 如果是自動更新，不隱藏結果，只顯示小載入動畫
            if (resultDiv.classList.contains('hidden')) {
                loadingDiv.classList.remove('hidden');
            }
            
            if (countdownInterval) clearInterval(countdownInterval);

            const systemPrompt = `你是一個專業氣象數據處理器。請針對 ${city}${dist} 查詢台灣氣象署即時資料。
            規範要求：
            1. 今天日期是 2025/02/28 (星期五)。
            2. 24小時預報 (hourly)：必須提供從下一小時開始的連續 24 筆氣象數據 (時間、氣溫、降雨率)。
            3. 一週預報 (weekly)：必須提供整整 7 天的資料。第一天 day 標註為 "今天"，之後依序為正確的週幾 (週六、週日、週一、週二、週三、週四)。
            4. 月相 (moonPhase)：僅限使用 [新月, 眉月, 上弦月, 盈凸月, 滿月, 虧凸月, 下弦月, 殘月]。
            5. 時間格式：updateTime 必須符合 YYYY/MM/DD HH:mm:ss。
            回傳格式為 JSON：
            {"current":{"temp":25,"feelsLike":27,"desc":"多雲時晴","humidity":60,"pop":10,"uvi":5,"windDir":"北","windSpeed":3},"astro":{"sunrise":"06:15","sunset":"18:10","moonrise":"12:30","moonset":"01:20","moonPhase":"盈凸月"},"hourly":[{"time":"18:00","temp":24,"pop":10}],"weekly":[{"date":"02/28","day":"今天","high":28,"low":20,"desc":"多雲"}],"updateTime":"2025/02/28 17:30:00"}`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `查詢 ${city}${dist} 的 24 小時及 7 天完整預報資料。` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                const data = await res.json();
                const text = data.candidates[0].content.parts[0].text;
                const weather = JSON.parse(text.match(/\{.*\}/s)[0]);
                render(weather, city, dist);
            } catch (e) {
                console.error("Fetch error:", e);
                loadingDiv.classList.add('hidden');
            }
        }

        function render(data, city, dist) {
            document.getElementById('locationName').textContent = `${city} ${dist}`;
            document.getElementById('temp').textContent = `${data.current.temp}°C`;
            document.getElementById('desc').textContent = data.current.desc;
            document.getElementById('weatherIconContainer').innerHTML = getWeatherIcon(data.current.desc, 80);
            
            document.getElementById('feelsLike').textContent = `${data.current.feelsLike}°C`;
            document.getElementById('pop').textContent = `${data.current.pop}%`;
            document.getElementById('uvi').textContent = data.current.uvi;
            document.getElementById('windInfo').textContent = `${data.current.windDir}風 ${data.current.windSpeed}m/s`;
            document.getElementById('humidity').textContent = `${data.current.humidity}%`;
            
            document.getElementById('moonIcon').innerHTML = getMoonIcon(data.astro.moonPhase);
            document.getElementById('moonPhase').textContent = data.astro.moonPhase;
            
            document.getElementById('sunrise').textContent = data.astro.sunrise;
            document.getElementById('sunset').textContent = data.astro.sunset;
            document.getElementById('moonrise').textContent = data.astro.moonrise;
            document.getElementById('moonset').textContent = data.astro.moonset;
            document.getElementById('lastUpdate').textContent = `最後更新：${data.updateTime}`;

            const umbrella = document.getElementById('umbrellaTip');
            if (data.current.pop >= 30) {
                umbrella.innerHTML = `<i data-lucide="umbrella" class="w-4 h-4"></i> 建議攜帶雨具`;
                umbrella.className = "mt-4 inline-flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold bg-blue-100 text-blue-700 shadow-sm";
            } else {
                umbrella.innerHTML = `<i data-lucide="sun" class="w-4 h-4"></i> 目前無需雨具`;
                umbrella.className = "mt-4 inline-flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold bg-green-100 text-green-700 shadow-sm";
            }

            // 24小時
            const hCont = document.getElementById('hourlyForecast');
            hCont.innerHTML = data.hourly.map(h => `
                <div class="flex-shrink-0 bg-white p-4 rounded-2xl border border-slate-100 text-center min-w-[85px] shadow-sm">
                    <div class="text-[10px] text-slate-400 font-bold mb-2">${h.time}</div>
                    <div class="flex justify-center mb-2">${getWeatherIcon(data.current.desc, 32)}</div>
                    <div class="font-bold text-slate-700 text-lg">${h.temp}°</div>
                    <div class="text-[10px] text-blue-500 font-black mt-1">💧${h.pop}%</div>
                </div>
            `).join('');

            // 一週預報
            const wCont = document.getElementById('weeklyForecast');
            wCont.innerHTML = data.weekly.map(w => `
                <div class="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-100 shadow-sm transition hover:shadow-md">
                    <div class="w-14">
                        <div class="font-bold ${w.day === '今天' ? 'text-blue-600' : 'text-slate-700'}">${w.day}</div>
                        <div class="text-[10px] text-slate-400">${w.date}</div>
                    </div>
                    <div class="flex-1 flex items-center gap-3 justify-center text-sm font-medium">
                        ${getWeatherIcon(w.desc, 24)}
                        <span>${w.desc}</span>
                    </div>
                    <div class="w-24 text-right">
                        <span class="text-orange-500 font-bold text-lg">${w.high}°</span>
                        <span class="text-slate-300 mx-2">/</span>
                        <span class="text-blue-400 font-bold text-lg">${w.low}°</span>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
            startTimer(data.astro.sunrise, data.astro.sunset);
            loadingDiv.classList.add('hidden');
            resultDiv.classList.remove('hidden');
        }

        function startTimer(sr, ss) {
            const el = document.getElementById('sunCountdown');
            const update = () => {
                const now = new Date();
                const [srH, srM] = sr.split(':').map(Number);
                const [ssH, ssM] = ss.split(':').map(Number);
                
                const tSR = new Date(); tSR.setHours(srH, srM, 0);
                const tSS = new Date(); tSS.setHours(ssH, ssM, 0);
                
                let target, label;
                if (now < tSR) { target = tSR; label = "日出"; }
                else if (now < tSS) { target = tSS; label = "日落"; }
                else { target = new Date(tSR.getTime() + 86400000); label = "明日日出"; }

                const diff = target - now;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el.textContent = `距離 ${label} 還有 ${h}時 ${m}分 ${s}秒`;
            };
            update();
            countdownInterval = setInterval(update, 1000);
        }

        searchBtn.addEventListener('click', fetchWeather);
    </script>
</body>
</html>
